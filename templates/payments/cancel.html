{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5 text-center">
        <div class="card p-5">
            <div class="mb-4">
                <i class="fa-solid fa-circle-xmark fa-4x text-warning"></i>
            </div>
            <h3 class="fw-bold mb-2">Payment Cancelled</h3>
            <p class="text-muted mb-4">
                Your payment was not completed. No charges were made.
                You can choose a plan again anytime from your dashboard.
            </p>
            <div class="d-grid gap-2">
                <a href="{{ url_for('payments.buy') }}" class="btn btn-primary">
                    <i class="fa-solid fa-rotate-left me-2"></i>Choose a Plan Again
                </a>
                <a href="{{ url_for('dashboard.home') }}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-gauge-high me-2"></i>Go to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
