{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-5 text-center">
        <div class="card p-5">
            <div class="mb-4">
                <i class="fa-solid fa-circle-check fa-4x text-success"></i>
            </div>
            <h3 class="fw-bold mb-2">Payment Successful!</h3>
            <p class="text-muted mb-4">
                Your payment has been received. Your membership is now active.
                A confirmation will be reflected in your payment history shortly.
            </p>
            <div class="d-grid gap-2">
                <a href="{{ url_for('dashboard.home') }}" class="btn btn-primary">
                    <i class="fa-solid fa-gauge-high me-2"></i>Go to Dashboard
                </a>
                <a href="{{ url_for('attendance.my_attendance') }}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-person-walking me-2"></i>View My Attendance
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
